version: '3.8'

services:  # Backend - Next.js API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - quiz-network
    depends_on:
      - redis
  # Frontend - Quasar/Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:3000/api/v1
    env_file:
      - ./frontend/.env.docker
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - quiz-network
    depends_on:
      - backend

  # Redis para rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quiz-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

networks:
  quiz-network:
    driver: bridge

volumes:
  redis-data:
